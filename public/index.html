<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.3);
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    h2 {
      color: #fff;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .user-form {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.8);
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      background: #fff;
      box-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #ff4d6d, #ff758f);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
    }

    #load-users {
      margin-bottom: 15px;
      width: 100%;
    }

    #users-list {
      display: grid;
      gap: 15px;
    }

    .user-card {
      background: rgba(255,255,255,0.85);
      padding: 15px 20px;
      border-radius: 12px;
      transition: 0.3s;
      border-left: 5px solid #ff4d6d;
    }

    .user-card:hover {
      transform: scale(1.02);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .user-card p {
      color: #333;
      font-size: 15px;
    }

    .highlight {
      color: #ff4d6d;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>✨ Gestion des Utilisateurs</h1>
    
    <div class="user-form">
      <h2>Ajouter un utilisateur</h2>
      <form id="add-user-form">
        <input type="text" id="nom" placeholder="Nom" required>
        <input type="text" id="prenom" placeholder="Prénom" required>
        <input type="number" id="age" placeholder="Âge">
        <button type="submit">Ajouter</button>
      </form>
    </div>
    
    <h2>Liste des utilisateurs</h2>
    <button id="load-users">Charger les utilisateurs</button>
    <div id="users-list"></div>
  </div>
  
  <script>
    document.getElementById('load-users').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/users');
        const users = await response.json();
        
        const usersList = document.getElementById('users-list');
        usersList.innerHTML = '';
        
        users.forEach(user => {
          const userDiv = document.createElement('div');
          userDiv.className = 'user-card';
          userDiv.innerHTML = `
            <p>
              <span class="highlight">${user.prenom} ${user.nom}</span>
              (${user.age} ans) - ID: ${user.id}
            </p>
          `;
          usersList.appendChild(userDiv);
        });
      } catch (error) {
        console.error('Erreur:', error);
      }
    });

    document.getElementById('add-user-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const nom = document.getElementById('nom').value;
      const prenom = document.getElementById('prenom').value;
      const age = parseInt(document.getElementById('age').value) || 0;
      
      try {
        const response = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, prenom, age })
        });
        
        const newUser = await response.json();
        alert(`Utilisateur ajouté avec l'ID: ${newUser.id}`);
        
        document.getElementById('add-user-form').reset();
        document.getElementById('load-users').click();
      } catch (error) {
        console.error('Erreur:', error);
      }
    });
  </script>

</body>
</html>
